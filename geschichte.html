<h1>Geschichte von Hertha BSC</h1>

<p>
Der Verein wurde 1892 gegründet und entwickelte sich schnell zu einem der bekanntesten Fußballvereine Deutschlands.
</p>

<p>
In den 1930er Jahren gewann Hertha zweimal die Deutsche Meisterschaft.
Auch später spielte der Verein regelmäßig in der Bundesliga.
</p>
